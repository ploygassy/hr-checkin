<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Check-in</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#00B900;--green-dark:#008f00;--red:#ef4444;--red-dark:#dc2626;--bg:#f0f9f0;--card:#fff;--text:#1a1a1a;--muted:#6b7280}
    body{font-family:'Sarabun',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
    #loading{text-align:center}
    .spinner{width:48px;height:48px;border:4px solid #e5e7eb;border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #app{width:100%;max-width:380px;display:none;flex-direction:column;gap:16px}
    .header-card{background:linear-gradient(135deg,var(--green),var(--green-dark));border-radius:20px;padding:24px;color:white;text-align:center;box-shadow:0 8px 32px rgba(0,185,0,0.25)}
    .avatar{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,0.5);margin:0 auto 12px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .user-name{font-size:20px;font-weight:800;margin-bottom:4px}
    .user-sub{font-size:13px;opacity:0.8}
    .time-card{background:var(--card);border-radius:16px;padding:20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    .clock{font-size:42px;font-weight:800;color:var(--text);letter-spacing:-1px}
    .date-text{font-size:14px;color:var(--muted);margin-top:4px}
    .info-card{background:var(--card);border-radius:16px;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);display:flex;flex-direction:column;gap:10px}
    .info-row{display:flex;justify-content:space-between;align-items:center;font-size:14px}
    .info-label{color:var(--muted);display:flex;align-items:center;gap:6px}
    .info-value{font-weight:700;color:var(--text)}
    .status-row{background:#f9fafb;border-radius:10px;padding:12px;display:flex;justify-content:space-between}
    .status-item{text-align:center}
    .status-label{font-size:11px;color:var(--muted);margin-bottom:4px}
    .status-val{font-size:15px;font-weight:700}
    .status-val.green{color:var(--green)}
    .status-val.red{color:var(--red)}
    .status-val.gray{color:#9ca3af}
    .location-card{border-radius:12px;padding:12px 16px;font-size:13px;text-align:center;font-weight:600}
    .location-card.checking{background:#fef9c3;color:#92400e}
    .location-card.ok{background:#dcfce7;color:#166534}
    .location-card.fail{background:#fee2e2;color:#991b1b}
    .btn-group{display:flex;flex-direction:column;gap:10px}
    .btn{width:100%;padding:18px;border:none;border-radius:14px;font-size:17px;font-weight:800;font-family:'Sarabun',sans-serif;cursor:pointer;transition:all 0.15s ease;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn:active{transform:scale(0.97)}
    .btn-checkin{background:linear-gradient(135deg,var(--green),var(--green-dark));color:white;box-shadow:0 4px 20px rgba(0,185,0,0.35)}
    .btn-checkout{background:linear-gradient(135deg,var(--red),var(--red-dark));color:white;box-shadow:0 4px 20px rgba(239,68,68,0.35)}
    .btn:disabled{background:#e5e7eb!important;color:#9ca3af!important;box-shadow:none!important;cursor:not-allowed}
    #success{display:none;text-align:center;max-width:380px;width:100%}
    .success-icon{font-size:72px;animation:pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);margin-bottom:16px}
    @keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
    .success-title{font-size:24px;font-weight:800;color:var(--text);margin-bottom:8px}
    .success-sub{font-size:15px;color:var(--muted);white-space:pre-line}
    #error-screen{display:none;text-align:center;padding:32px}
    .footer-note{text-align:center;font-size:12px;color:#9ca3af}
    .saved-badge{background:#dcfce7;color:#166534;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:4px}
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p style="color:#6b7280;font-size:14px;">กำลังโหลด...</p>
  </div>

  <div id="app">
    <div class="header-card">
      <div class="avatar" id="avatarBox">👤</div>
      <div class="user-name" id="userName">กำลังโหลด...</div>
      <div class="user-sub">ระบบบันทึกเวลาเข้า-ออกงาน</div>
    </div>

    <div class="time-card">
      <div class="clock" id="clock">00:00:00</div>
      <div class="date-text" id="dateText"></div>
    </div>

    <div class="info-card">
      <div class="info-row"><span class="info-label">📍 สถานที่</span><span class="info-value">เน่นอร์มาร์เก็ต</span></div>
      <div class="info-row"><span class="info-label">🕐 เวลางาน</span><span class="info-value">08:00 – 18:00 น.</span></div>
      <hr style="border:none;border-top:1px solid #f0f0f0"/>
      <div class="status-row">
        <div class="status-item"><div class="status-label">Check-in</div><div class="status-val green" id="checkinDisplay">–</div></div>
        <div class="status-item"><div class="status-label">Check-out</div><div class="status-val red" id="checkoutDisplay">–</div></div>
        <div class="status-item"><div class="status-label">OT วันนี้</div><div class="status-val gray" id="otDisplay">–</div></div>
      </div>
      <div id="dbStatus" style="text-align:center"></div>
    </div>

    <div class="location-card checking" id="locationCard">📡 กำลังตรวจสอบ...</div>

    <div class="btn-group">
      <button class="btn btn-checkin" id="btnCheckin" onclick="doCheckIn()" disabled>✅ Check-in เข้างาน</button>
      <button class="btn btn-checkout" id="btnCheckout" onclick="doCheckOut()" disabled>🔴 Check-out ออกงาน</button>
    </div>
    <div class="footer-note">ต้องต่อ WiFi ร้านและอยู่ในร้านเท่านั้น</div>
  </div>

  <div id="success">
    <div class="success-icon" id="successIcon">✅</div>
    <div class="success-title" id="successTitle">บันทึกสำเร็จ!</div>
    <div class="success-sub" id="successSub"></div>
  </div>

  <div id="error-screen">
    <div style="font-size:48px;margin-bottom:16px">⚠️</div>
    <div style="font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:8px">เกิดข้อผิดพลาด</div>
    <div style="font-size:14px;color:#6b7280" id="errorMsg">กรุณาเปิดผ่านแอปไลน์</div>
  </div>

<script>
  const LIFF_ID = "2010083543-RboGnZ3t";
  const WORK_START = "08:00";
  const WORK_END = "18:00";
  const SUPABASE_URL = "https://qtcverqtuocwszhswfom.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0Y3ZlcnF0dW9jd3N6aHN3Zm9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzkxNjAsImV4cCI6MjA5NDMxNTE2MH0.IrMc9v1b1qyYl5stp7Ll_0JCn3zboTuAmwtAH0bhB5Y";
  const NOTIFY_URL = "https://qtcverqtuocwszhswfom.supabase.co/functions/v1/notify-admin";

  const SHOP_LAT = 17.6360381;
  const SHOP_LNG = 104.1267423;
  const MAX_DISTANCE = 200;
  const SHOP_IP = "49.228.168.153";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let userId = "", userName = "", todayRecord = null, locationOK = false;

  function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLng = (lng2-lng1) * Math.PI/180;
    const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function checkIP() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      return data.ip === SHOP_IP;
    } catch(e) { return false; }
  }

  function checkLocation() {
    const card = document.getElementById('locationCard');
    card.className = 'location-card checking';
    card.textContent = '📡 กำลังตรวจสอบตำแหน่ง...';

    if (!navigator.geolocation) {
      card.className = 'location-card fail';
      card.textContent = '❌ มือถือไม่รองรับ GPS';
      return;
    }

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const dist = getDistance(pos.coords.latitude, pos.coords.longitude, SHOP_LAT, SHOP_LNG);
        const distRounded = Math.round(dist);

        if (dist > MAX_DISTANCE) {
          locationOK = false;
          card.className = 'location-card fail';
          card.textContent = `❌ อยู่นอกร้าน (ห่าง ${distRounded} ม.)`;
          document.getElementById('btnCheckin').disabled = true;
          return;
        }

        const ipOK = await checkIP();
        if (!ipOK) {
          locationOK = false;
          card.className = 'location-card fail';
          card.textContent = '❌ กรุณาต่อ WiFi ของร้านก่อน Check-in';
          document.getElementById('btnCheckin').disabled = true;
          return;
        }

        locationOK = true;
        card.className = 'location-card ok';
        card.textContent = `✅ อยู่ในร้าน (ห่าง ${distRounded} ม.)`;
        updateButtons();
      },
      (err) => {
        card.className = 'location-card fail';
        card.textContent = '❌ ไม่สามารถดึง GPS ได้ กรุณาเปิด Location';
        locationOK = false;
        document.getElementById('btnCheckin').disabled = true;
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  function updateButtons() {
    if (todayRecord && todayRecord.checkin_time && !todayRecord.checkout_time) {
      document.getElementById('btnCheckin').disabled = true;
      document.getElementById('btnCheckout').disabled = false;
    } else if (!todayRecord || !todayRecord.checkin_time) {
      document.getElementById('btnCheckin').disabled = !locationOK;
      document.getElementById('btnCheckout').disabled = true;
    } else {
      document.getElementById('btnCheckin').disabled = true;
      document.getElementById('btnCheckout').disabled = true;
    }
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
    const days=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
    const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    document.getElementById('dateText').textContent=`วัน${days[now.getDay()]}ที่ ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()+543}`;
  }
  setInterval(updateClock,1000);updateClock();

  function getNowTime(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')}
  function getToday(){const n=new Date();const b=new Date(n.toLocaleString("en-US",{timeZone:"Asia/Bangkok"}));return b.getFullYear()+'-'+String(b.getMonth()+1).padStart(2,'0')+'-'+String(b.getDate()).padStart(2,'0')}
  function calcOTMinutes(t){const[ch,cm]=t.split(':').map(Number);const[eh,em]=WORK_END.split(':').map(Number);const diff=(ch*60+cm)-(eh*60+em);return diff>15?diff:0}
  function formatOT(m){if(!m||m<=0)return null;const h=Math.floor(m/60),mn=m%60;return h>0?`${h} ชม. ${mn} นาที`:`${mn} นาที`}
  function isLate(t){const[ch,cm]=t.split(':').map(Number);const[sh,sm]=WORK_START.split(':').map(Number);return(ch*60+cm)>(sh*60+sm+15)}

  async function notifyAdmin(type, time, ot, late) {
    try {
      await fetch(NOTIFY_URL, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({userName,time,type,ot:ot||null,late:late||false,date:document.getElementById('dateText').textContent})
      });
    } catch(e) {}
  }

  async function loadTodayRecord() {
    const {data} = await sb.from('checkins').select('*').eq('user_id',userId).eq('date',getToday()).single();
    if(data){
      todayRecord=data;
      if(data.checkin_time){
        const t=new Date(data.checkin_time);
        document.getElementById('checkinDisplay').textContent=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
      }
      if(data.checkout_time){
        const t=new Date(data.checkout_time);
        document.getElementById('checkoutDisplay').textContent=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
        document.getElementById('otDisplay').textContent=formatOT(data.ot_minutes)||'–';
      }
      document.getElementById('dbStatus').innerHTML='<span class="saved-badge">☁️ ซิงค์กับ Database แล้ว</span>';
    }
    updateButtons();
  }

  async function doCheckIn() {
    if (!locationOK) { alert('❌ คุณไม่อยู่ในร้าน หรือยังไม่ต่อ WiFi ร้าน'); return; }
    document.getElementById('btnCheckin').disabled=true;
    const now=getNowTime();
    const late=isLate(now);
    const {data,error}=await sb.from('checkins').upsert({
      user_id:userId,user_name:userName,checkin_time:new Date().toISOString(),date:getToday()
    },{onConflict:'user_id,date'}).select().single();
    if(error){alert('เกิดข้อผิดพลาด: '+error.message);document.getElementById('btnCheckin').disabled=false;return;}
    todayRecord=data;
    document.getElementById('checkinDisplay').textContent=now;
    document.getElementById('btnCheckout').disabled=false;
    document.getElementById('dbStatus').innerHTML='<span class="saved-badge">☁️ บันทึกลง Database แล้ว</span>';
    await notifyAdmin("checkin",now,null,late);
    try{await liff.sendMessages([{type:'text',text:`✅ Check-in สำเร็จ!\n👤 ${userName}\n🕐 ${now} น.\n📅 ${document.getElementById('dateText').textContent}${late?'\n⚠️ มาสาย':'\n✨ มาตรงเวลา!'}`}]);}catch(e){}
    showSuccess('✅','Check-in สำเร็จ!',`เวลา ${now} น.`);
  }

  async function doCheckOut() {
    document.getElementById('btnCheckout').disabled=true;
    const now=getNowTime();
    const otMin=calcOTMinutes(now);
    const otText=formatOT(otMin);
    const {error}=await sb.from('checkins').update({checkout_time:new Date().toISOString(),ot_minutes:otMin}).eq('id',todayRecord.id);
    if(error){alert('เกิดข้อผิดพลาด: '+error.message);document.getElementById('btnCheckout').disabled=false;return;}
    document.getElementById('checkoutDisplay').textContent=now;
    document.getElementById('otDisplay').textContent=otText||'–';
    document.getElementById('dbStatus').innerHTML='<span class="saved-badge">☁️ บันทึกลง Database แล้ว</span>';
    await notifyAdmin("checkout",now,otText,false);
    try{await liff.sendMessages([{type:'text',text:`🔴 Check-out สำเร็จ!\n👤 ${userName}\n🕐 ${now} น.${otText?`\n⏱️ OT: ${otText}`:'\n✅ ไม่มี OT'}`}]);}catch(e){}
    showSuccess('🏠','Check-out สำเร็จ!',`เวลา ${now} น.${otText?`\nOT: ${otText}`:''}`);
  }

  function showSuccess(icon,title,sub){
    document.getElementById('app').style.display='none';
    document.getElementById('success').style.display='block';
    document.getElementById('successIcon').textContent=icon;
    document.getElementById('successTitle').textContent=title;
    document.getElementById('successSub').textContent=sub;
    setTimeout(()=>{liff.closeWindow();},3000);
  }

  async function initLiff() {
    try {
      await liff.init({liffId:LIFF_ID});
      if(!liff.isLoggedIn()){liff.login();return;}
      const profile=await liff.getProfile();
      userId=profile.userId;userName=profile.displayName;
      document.getElementById('userName').textContent=userName;
      if(profile.pictureUrl){document.getElementById('avatarBox').innerHTML=`<img src="${profile.pictureUrl}" alt="avatar"/>`;}
      await loadTodayRecord();
      document.getElementById('loading').style.display='none';
      document.getElementById('app').style.display='flex';
      checkLocation();
      setInterval(checkLocation, 30000);
    }catch(err){
      document.getElementById('loading').style.display='none';
      document.getElementById('error-screen').style.display='block';
      document.getElementById('errorMsg').textContent=err.message||'กรุณาเปิดผ่านแอปไลน์';
    }
  }
  initLiff();
</script>
</body>
</html>
